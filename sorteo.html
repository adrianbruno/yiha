<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorteo · Yiha! 221countryLP</title>
  <meta name="theme-color" content="#060c14">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js" as="script">
  <style>
    :root{--tierra:#1a0a00;--arena:#c8a06a;--paja:#e8d5a3;--hueso:#f5ecd7;--rojo:#8b1a1a;--rojo-vivo:#c0392b;--dorado:#c9922a;--dorado-claro:#f0c040;--verde:#27ae60;--surface:rgba(61,31,0,0.7);--border:rgba(200,160,106,0.25)}
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Josefin Sans',sans-serif;background:#060c14;color:var(--hueso)}
    .sky{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 0%,#1a2a4a 0%,#0a1428 40%,#030810 100%)}
    .stars{position:fixed;inset:0;z-index:1;pointer-events:none}
    .star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate;animation-delay:var(--delay)}
    @keyframes twinkle{from{opacity:0.1}to{opacity:1}}
    .screen{position:fixed;inset:0;z-index:10;display:none}
    .screen.active{display:flex}

    #screenLogin{flex-direction:column;align-items:center;justify-content:center;padding:2rem}
    .login-vic{height:220px;filter:drop-shadow(0 12px 30px rgba(0,0,0,0.7));animation:vic-float 3s ease-in-out infinite;margin-bottom:1.5rem}
    .login-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:2rem;width:100%;max-width:380px;backdrop-filter:blur(12px)}
    .login-titulo{font-family:'Rye',serif;font-size:1.5rem;color:var(--dorado-claro);text-align:center;margin-bottom:0.25rem;text-shadow:0 0 20px rgba(240,192,64,0.4)}
    .login-sub{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--arena);text-align:center;margin-bottom:1.5rem;opacity:0.7}
    .campo label{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--arena);opacity:0.8;display:block;margin-bottom:0.3rem}
    input{background:rgba(26,10,0,0.7);border:1px solid var(--border);border-radius:3px;color:var(--hueso);font-family:'Josefin Sans',sans-serif;font-size:1rem;padding:0.8rem;width:100%;outline:none;transition:border-color 0.15s;margin-bottom:1rem;-webkit-appearance:none}
    input:focus{border-color:rgba(240,192,64,0.6);box-shadow:0 0 0 2px rgba(240,192,64,0.1)}
    .test-toggle{margin-top:0.5rem;padding:0.5rem 0.75rem;background:rgba(200,160,106,0.1);border:1px solid rgba(200,160,106,0.2);border-radius:4px}
    .test-toggle summary{font-size:0.7rem;color:var(--arena);cursor:pointer;letter-spacing:0.1em;text-transform:uppercase}
    .test-toggle .campo{margin-top:0.5rem}

    #screenPremios{flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;gap:2rem}
    .premios-titulo{font-family:'Rye',serif;font-size:clamp(2rem,5vw,3.5rem);color:var(--dorado-claro);text-align:center;text-shadow:0 0 40px rgba(240,192,64,0.5)}
    .premios-sub{font-size:0.8rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--arena);opacity:0.7}
    .premios-grid{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;max-width:900px;width:100%}
    .premio-card{background:linear-gradient(160deg,rgba(61,31,0,0.8),rgba(26,10,0,0.9));border:1px solid rgba(201,146,42,0.3);border-radius:6px;padding:1.5rem 2rem;cursor:pointer;transition:all 0.2s;text-align:center;min-width:200px;flex:1;max-width:280px}
    .premio-card:hover{border-color:var(--dorado);transform:translateY(-4px);box-shadow:0 12px 40px rgba(201,146,42,0.2)}
    .premio-card.ganado{opacity:0.4;cursor:not-allowed}.premio-card.ganado:hover{transform:none;box-shadow:none}
    .premio-orden{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--arena);opacity:0.6;margin-bottom:0.5rem}
    .premio-nombre{font-family:'Rye',serif;font-size:1.3rem;color:var(--dorado-claro);margin-bottom:0.25rem}
    .premio-desc{font-size:0.78rem;color:var(--paja);opacity:0.8;margin-bottom:0.75rem}
    .premio-ganadores{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--arena);opacity:0.6}
    .premio-badge-ganado{display:inline-block;background:rgba(39,174,96,0.2);border:1px solid rgba(39,174,96,0.4);border-radius:20px;padding:0.2rem 0.75rem;font-size:0.68rem;color:#7efca8;margin-top:0.5rem}
    .vic-premios-wrap{position:fixed;bottom:0;right:2rem;z-index:5}
    .vic-premios{height:clamp(180px,20vw,280px);filter:drop-shadow(0 8px 24px rgba(0,0,0,0.6));animation:vic-float 3s ease-in-out infinite}

    #screenSorteo{flex-direction:column;align-items:center;justify-content:center}
    #canvas{position:absolute;inset:0;z-index:3}
    .nombre-flotante{position:absolute;z-index:7;pointer-events:none;font-family:'Josefin Sans',sans-serif;font-weight:700;color:white;text-align:center;line-height:1;text-shadow:0 1px 4px rgba(0,0,0,0.95);transform:translate(-50%,-50%);white-space:nowrap;overflow:hidden}
    .premio-actual{position:absolute;top:2%;left:50%;transform:translateX(-50%);z-index:6;text-align:center;background:linear-gradient(160deg,rgba(61,31,0,0.9),rgba(26,10,0,0.95));border:1px solid rgba(201,146,42,0.4);border-radius:6px;padding:0.6rem 2rem;backdrop-filter:blur(12px);white-space:nowrap}
    .premio-actual-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--arena);opacity:0.7}
    .premio-actual-nombre{font-family:'Rye',serif;font-size:clamp(1.2rem,3vw,2rem);color:var(--dorado-claro)}
    .vic-sorteo-izq{position:absolute;bottom:0;left:0;z-index:5;height:clamp(130px,14vw,200px);filter:drop-shadow(0 8px 24px rgba(0,0,0,0.6));animation:vic-float 3s ease-in-out infinite}
    .vic-sorteo-der{position:absolute;bottom:0;right:0;z-index:5;height:clamp(130px,14vw,200px);filter:drop-shadow(0 8px 24px rgba(0,0,0,0.6));animation:vic-float 3s ease-in-out 1s infinite;transform:scaleX(-1)}
    .btn-sortear-wrap{position:absolute;bottom:2%;left:50%;transform:translateX(-50%);z-index:8}
    .participantes-badge{position:absolute;top:2%;right:1.5%;z-index:6;background:rgba(26,10,0,0.85);border:1px solid rgba(201,146,42,0.3);border-radius:4px;padding:0.5rem 0.8rem;text-align:center}
    .part-num{font-family:'Rye',serif;font-size:1.6rem;color:var(--dorado-claro);line-height:1}
    .part-label{font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--arena);opacity:0.7}
    .eliminacion-counter{position:absolute;top:2%;left:1.5%;z-index:6;background:rgba(26,10,0,0.85);border:1px solid rgba(192,57,43,0.3);border-radius:4px;padding:0.5rem 0.8rem;text-align:center;display:none}
    .elim-num{font-family:'Rye',serif;font-size:1.6rem;color:#f08080;line-height:1}
    .elim-label{font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--arena);opacity:0.7}
    .nombre-eliminado{position:absolute;z-index:9;pointer-events:none;font-family:'Rye',serif;color:var(--dorado-claro);text-shadow:0 0 10px rgba(240,192,64,0.6);opacity:1;transition:all 0.8s ease-out;white-space:nowrap}
    .nombre-eliminado.volando{opacity:0;transform:translateY(-120px) scale(0.5)}

    /* SOMBRERO GRANDE */
    .sombrero-container{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);z-index:4;pointer-events:none}
    .sombrero-container.shaking{animation:shake 0.3s linear infinite}
    .sombrero-container.shaking-hard{animation:shake-hard 0.25s linear infinite}

    /* FINALISTAS */
    .finalistas-wrap{position:absolute;top:8%;left:50%;transform:translateX(-50%);z-index:9;text-align:center;display:none}
    .finalistas-label{font-family:'Rye',serif;font-size:clamp(1.5rem,4vw,2.5rem);color:var(--dorado-claro);text-shadow:0 0 30px rgba(240,192,64,0.6);animation:entrar 0.5s ease both;margin-bottom:0.5rem}
    .countdown-num{font-family:'Rye',serif;color:var(--dorado-claro);text-shadow:0 0 40px rgba(240,192,64,0.8),0 0 80px rgba(240,192,64,0.4);opacity:0;animation:countdown-pop 2.5s ease-out forwards}
    @keyframes countdown-pop{0%{opacity:0;transform:scale(0.3);text-shadow:0 0 20px rgba(240,192,64,0.3)}15%{opacity:1;transform:scale(1.2)}30%{transform:scale(1)}90%{opacity:1;transform:scale(1)}100%{opacity:0.3;transform:scale(0.9)}}

    #screenGanador{flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;gap:1.5rem}
    .ganador-vic{height:clamp(180px,20vw,260px);filter:drop-shadow(0 0 40px rgba(240,192,64,0.4));animation:vic-float 2.5s ease-in-out infinite}
    .ganador-cartel{background:linear-gradient(160deg,#5c3210,#2a1200);border:3px solid var(--dorado);border-radius:6px;padding:2rem 3rem;position:relative;box-shadow:0 0 0 1px #1a0a00,0 0 0 5px #6b3a1f,0 20px 60px rgba(0,0,0,0.8);animation:cartel-entrada 0.8s cubic-bezier(0.34,1.56,0.64,1) both;max-width:600px;width:90%}
    @keyframes cartel-entrada{from{opacity:0;transform:scale(0.5) rotate(-5deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
    .ganador-cartel::before{content:'✦';position:absolute;top:12px;left:16px;color:var(--dorado);font-size:14px;opacity:0.7}
    .ganador-cartel::after{content:'✦';position:absolute;top:12px;right:16px;color:var(--dorado);font-size:14px;opacity:0.7}
    .ganador-label{font-size:0.7rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--arena);opacity:0.8;margin-bottom:0.5rem}
    .ganador-premio{font-family:'Rye',serif;font-size:clamp(1rem,3vw,1.8rem);color:var(--dorado);margin-bottom:1rem;opacity:0.9}
    .ganador-nombre{font-family:'Rye',serif;font-size:clamp(2rem,6vw,4.5rem);color:var(--dorado-claro);line-height:1.1;text-shadow:0 0 40px rgba(240,192,64,0.6),3px 3px 0 rgba(0,0,0,0.5)}
    .confetti-wrap{position:fixed;inset:0;z-index:15;pointer-events:none}
    .ganador-botones{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}

    .btn{padding:0.9rem 2rem;border-radius:4px;font-family:'Josefin Sans',sans-serif;font-size:0.82rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;justify-content:center;gap:0.5rem;border:none}
    .btn-dorado{background:linear-gradient(160deg,#c9922a,#8b5e1a);color:var(--hueso);box-shadow:0 6px 24px rgba(201,146,42,0.4);font-size:1rem;padding:1rem 2.5rem}
    .btn-dorado:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 10px 32px rgba(201,146,42,0.5)}
    .btn-dorado:disabled{opacity:0.4;cursor:not-allowed}
    .btn-rojo{background:linear-gradient(160deg,var(--rojo-vivo),var(--rojo));color:var(--hueso);box-shadow:0 4px 16px rgba(192,57,43,0.4)}
    .btn-rojo:hover{transform:translateY(-2px)}
    .btn-verde{background:linear-gradient(160deg,#2ecc71,#27ae60);color:white;box-shadow:0 4px 16px rgba(39,174,96,0.4)}
    .btn-verde:hover{transform:translateY(-2px)}
    .btn-outline{background:transparent;color:var(--arena);border:1px solid rgba(200,160,106,0.4)}
    .btn-outline:hover{background:rgba(200,160,106,0.08);color:var(--hueso)}
    .btn-grande{font-size:1.1rem;padding:1.1rem 3rem}

    @keyframes vic-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes entrar{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes confetti-caer{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
    @keyframes shake{0%,100%{transform:translateX(-50%) rotate(0)}15%{transform:translateX(-50%) rotate(-3deg)}30%{transform:translateX(-50%) rotate(3deg)}45%{transform:translateX(-50%) rotate(-4deg)}60%{transform:translateX(-50%) rotate(4deg)}75%{transform:translateX(-50%) rotate(-2deg)}90%{transform:translateX(-50%) rotate(2deg)}}
    @keyframes shake-hard{0%,100%{transform:translateX(-50%) rotate(0)}12%{transform:translateX(-50%) rotate(-7deg) translateY(-6px)}25%{transform:translateX(-50%) rotate(7deg) translateY(4px)}37%{transform:translateX(-50%) rotate(-8deg) translateY(-5px)}50%{transform:translateX(-50%) rotate(8deg) translateY(6px)}62%{transform:translateX(-50%) rotate(-6deg)}75%{transform:translateX(-50%) rotate(6deg)}87%{transform:translateX(-50%) rotate(-3deg)}}

    .toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:200;background:rgba(139,26,26,0.95);border:1px solid rgba(192,57,43,0.5);border-radius:3px;padding:0.75rem 1.25rem;font-size:0.85rem;color:#f5d5d5;max-width:400px;text-align:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
    .toast.visible{opacity:1}
    .spinner{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);border-top-color:white;animation:spin 0.7s linear infinite;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* PANEL DE GANADORES */
    .ganadores-panel{position:fixed;top:0;left:0;bottom:0;width:280px;z-index:20;background:transparent;overflow-y:auto;padding:1rem;display:none;animation:slide-in 0.4s ease both}
    @keyframes slide-in{from{transform:translateX(-100%)}to{transform:translateX(0)}}
    .ganadores-panel-titulo{font-family:'Rye',serif;font-size:1rem;color:var(--dorado-claro);text-align:center;margin-bottom:0.75rem;letter-spacing:0.1em;text-transform:uppercase;text-shadow:0 0 20px rgba(240,192,64,0.4)}
    .ganador-item{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0;border-bottom:1px solid rgba(201,146,42,0.15);animation:entrar 0.4s ease both}
    .ganador-item-logo{width:60px;height:60px;border-radius:6px;object-fit:contain;background:rgba(255,255,255,0.95);padding:4px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.4)}
    .ganador-item-logo-placeholder{width:60px;height:60px;border-radius:6px;background:rgba(201,146,42,0.2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
    .ganador-item-info{flex:1;min-width:0}
    .ganador-item-premio{font-size:0.7rem;color:var(--dorado);letter-spacing:0.08em;text-transform:uppercase;text-shadow:0 1px 3px rgba(0,0,0,0.8);margin-bottom:0.15rem}
    .ganador-item-nombre{font-family:'Rye',serif;font-size:1.1rem;color:var(--dorado-claro);text-shadow:0 0 10px rgba(240,192,64,0.3),0 2px 4px rgba(0,0,0,0.8);line-height:1.2}
    .ganadores-vacio{font-size:0.7rem;color:var(--arena);opacity:0.5;text-align:center;padding:1rem 0}

    /* Ajustar pantallas cuando el panel está visible - NO el sorteo */
    .con-panel #screenPremios,.con-panel #screenGanador,.con-panel #screenFinal{padding-left:290px}

    /* PANTALLA FINAL */
    #screenFinal{flex-direction:column;align-items:center;justify-content:center;padding:3rem;text-align:center}
    .final-vic{height:clamp(200px,25vw,320px);filter:drop-shadow(0 0 40px rgba(240,192,64,0.5));animation:vic-float 3s ease-in-out infinite;margin-bottom:2rem}
    .final-titulo{font-family:'Rye',serif;font-size:clamp(2.5rem,7vw,5rem);color:var(--dorado-claro);text-shadow:0 0 50px rgba(240,192,64,0.6),3px 3px 0 rgba(0,0,0,0.5);margin-bottom:1rem;animation:entrar 0.8s ease both}
    .final-sub{font-size:clamp(1rem,3vw,1.5rem);color:var(--paja);letter-spacing:0.15em;text-transform:uppercase;opacity:0.9;animation:entrar 0.8s ease 0.3s both}
  </style>
</head>
<body>
<div class="sky"></div>
<div class="stars" id="stars"></div>
<div class="toast" id="toast"></div>
<audio id="musicaSorteo" src="audio/sonido.mp3" preload="auto" loop></audio>

<!-- PANEL DE GANADORES (lateral izquierdo) -->
<div class="ganadores-panel" id="ganadoresPanel">
  <div class="ganadores-panel-titulo">🏆 Ganadores</div>
  <div id="ganadoresLista">
    <div class="ganadores-vacio">Aún no hay ganadores</div>
  </div>
</div>

<div class="screen active" id="screenLogin">
  <img src="img/vic_juntos_saludo.png" class="login-vic" alt="Vic">
  <div class="login-card">
    <div class="login-titulo">¡Sorteo!</div>
    <div class="login-sub">Cumple 221countryLP · 3 Oct 2026</div>
    <div class="campo"><label>Contraseña</label><input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter') entrarSorteo()"></div>
    <button class="btn btn-dorado" style="width:100%" onclick="entrarSorteo()"><div class="spinner" id="spinnerLogin"></div><span id="txtLogin">🎉 Entrar al sorteo</span></button>
    <details class="test-toggle"><summary>Modo test</summary><div class="campo"><label>Simular participantes</label><input type="number" id="testCantidad" value="0" min="0" max="300"></div></details>
  </div>
</div>

<div class="screen" id="screenPremios">
  <div class="premios-titulo" style="animation:entrar 0.6s ease both">¿Qué sorteamos?</div>
  <div class="premios-sub" style="animation:entrar 0.6s ease 0.1s both">Elegí el premio</div>
  <div class="premios-grid" id="premiosGrid" style="animation:entrar 0.6s ease 0.2s both"></div>
  <div class="vic-premios-wrap"><img src="img/vic_apoyado_valla.png" class="vic-premios" alt="Vic"></div>
</div>

<div class="screen" id="screenSorteo">
  <div class="premio-actual"><div class="premio-actual-label">Sorteando</div><div class="premio-actual-nombre" id="premioActualNombre">---</div></div>
  <div class="participantes-badge"><div class="part-num" id="partNum">0</div><div class="part-label">Participantes</div></div>
  <div class="eliminacion-counter" id="elimCounter"><div class="elim-num" id="elimNum">0</div><div class="elim-label">Quedan</div></div>
  <div class="finalistas-wrap" id="finalistasWrap">
    <div class="finalistas-label">¡El ganador en...!</div>
    <div id="countdownContainer"></div>
  </div>
  <canvas id="canvas"></canvas>

  <div class="sombrero-container" id="sombreroContainer">
    <svg id="sombreroSvg" viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="300" cy="340" rx="290" ry="20" fill="rgba(0,0,0,0.4)"/>
      <ellipse cx="300" cy="330" rx="280" ry="28" fill="#2a1a08" stroke="#6b3a1f" stroke-width="2"/>
      <ellipse cx="300" cy="326" rx="280" ry="24" fill="#3d2510"/>
      <path d="M70 320 Q55 200 75 110 Q95 35 300 30 Q505 35 525 110 Q545 200 530 320 Z" fill="#2a1a08"/>
      <path d="M78 318 Q62 200 82 112 Q100 40 300 36 Q500 40 518 112 Q538 200 522 318 Z" fill="#3d2510"/>
      <path d="M80 130 Q95 118 300 115 Q505 118 520 130 Q505 142 300 145 Q95 142 80 130 Z" fill="#c9922a" opacity="0.6"/>
      <rect x="282" y="122" width="36" height="14" rx="3" fill="#f0c040" opacity="0.8"/>
      <rect x="288" y="126" width="24" height="8" rx="2" fill="#c9922a"/>
      <ellipse cx="300" cy="34" rx="210" ry="22" fill="rgba(10,5,0,0.6)" stroke="#6b3a1f" stroke-width="1.5"/>
      <path d="M108 300 Q95 200 108 130" stroke="rgba(240,192,64,0.08)" stroke-width="4" fill="none"/>
    </svg>
  </div>

  <img src="img/vic_bailando_juntos.png" class="vic-sorteo-izq" alt="Vic">
  <img src="img/vic_juntos_pulgar.png" class="vic-sorteo-der" alt="Vic">
  <div class="btn-sortear-wrap"><button class="btn btn-dorado btn-grande" id="btnSortear" onclick="iniciarSorteo()"><div class="spinner" id="spinnerSorteo"></div><span id="txtSortear">🤠 ¡Sortear!</span></button></div>
</div>

<div class="screen" id="screenGanador">
  <div class="confetti-wrap" id="confettiWrap"></div>
  <img src="img/vic_juntos_highfive.png" class="ganador-vic" alt="Vic">
  <div class="ganador-cartel"><div class="ganador-label">¡FELICITACIONES ganaste...!</div><div class="ganador-premio" id="ganadorPremio">Premio</div><div class="ganador-nombre" id="ganadorNombre">Nombre</div></div>
  <div class="ganador-botones">
    <button class="btn btn-verde btn-grande" onclick="marcarEntregado()">✅ Premio entregado</button>
    <button class="btn btn-rojo" onclick="sortearDeNuevo()">🔄 Sortear de nuevo</button>
    <button class="btn btn-outline" onclick="volverAPremios()">← Otro premio</button>
  </div>
</div>

<!-- PANTALLA FINAL -->
<div class="screen" id="screenFinal">
  <div class="confetti-wrap" id="confettiFinal"></div>
  <img src="img/vic_juntos_highfive.png" class="final-vic" alt="Vic">
  <div class="final-titulo">¡GRACIAS a todos por participar!</div>
  <div class="final-sub">Cumple 221countryLP · Yiha! 🤠🌵</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const API='https://script.google.com/macros/s/AKfycbzgZNqX4YHQ8yONqi5a_lS1JGUA-X58KcBotLqc3dYSBEnkhcM2l0HTKsOXum9iWr2E/exec';
let password='',personas=[],pool=[],premios=[],premioActual=null,ganadorActual=null;
let engine,render,runner,bolitas=[],sorteando=false,testMode=0;
let ganadoresRegistrados=[];

(function(){const c=document.getElementById('stars');for(let i=0;i<150;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2.5+0.5;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*75}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s`;c.appendChild(s)}})();

async function entrarSorteo(){
  const pass=document.getElementById('loginPass').value.trim();
  if(!pass){mostrarToast('Ingresá la contraseña');return}
  testMode=parseInt(document.getElementById('testCantidad').value)||0;
  setLoading('spinnerLogin','txtLogin',true,'Entrando...');
  try{
    const[rC,rP,rPe]=await Promise.all([fetch(`${API}?action=config_admin&password=${encodeURIComponent(pass)}`),fetch(`${API}?action=premios_sorteo&password=${encodeURIComponent(pass)}`),fetch(`${API}?action=personas_sorteo&password=${encodeURIComponent(pass)}`)]);
    const[dC,dP,dPe]=await Promise.all([rC.json(),rP.json(),rPe.json()]);
    if(!dC.ok){mostrarToast(dC.error||'Contraseña incorrecta');return}
    password=pass;premios=dP.premios||[];personas=dPe.personas||[];
    // Cargar estado persistente
    premios.forEach(function(p){ p._ganados = p.ganados || 0; });
    var ganadoresServidor = dP.ganadores || [];
    
    if(testMode>0){
      const noms=['Ana','Luis','María','Carlos','Laura','Pedro','Sofía','Diego','Lucía','Martín','Valentina','Tomás','Camila','Mateo','Julieta','Nicolás','Florencia','Santiago','Milagros','Agustín','Rocío','Bruno','Celeste','Franco','Abril','Gonzalo','Pilar','Facundo','Delfina','Lautaro','Carolina','Joaquín','Paula','Ramiro','Daniela','Hernán','Aldana','Ignacio','Brenda','Mauro','Andrea','Ezequiel','Romina','Gastón','Natalia','Sergio','Mora','Sebastián','Candela','Emmanuel','Valeria'];
      const apes=['García','López','Martínez','Rodríguez','Pérez','González','Sánchez','Romero','Gómez','Torres','Díaz','Fernández','Álvarez','Moreno','Ruiz','Acosta','Molina','Castro','Herrera','Medina','Ortiz','Silva','Ríos','Flores','Benítez'];
      personas=[];for(let i=0;i<testMode;i++)personas.push({id:'T-'+i,nombre:noms[i%noms.length],apellido:apes[i%apes.length]});
    }
    
    // Excluir personas que ya ganaron del pool
    var ganadoresIds = {};
    ganadoresServidor.forEach(function(g){ ganadoresIds[g.persona_id] = true; });
    pool = personas.filter(function(p){ return !ganadoresIds[p.id]; });
    
    if(!personas.length){mostrarToast('No hay participantes');return}
    
    // Reconstruir panel de ganadores si hay previos
    if(ganadoresServidor.length > 0) {
      ganadoresRegistrados = [];
      ganadoresServidor.forEach(function(g) {
        var premio = null;
        for(var i=0;i<premios.length;i++){
          if(String(premios[i].id) === String(g.premio_id)){ premio = premios[i]; break; }
        }
        if(premio) {
          agregarGanadorPanel(premio, { nombre: g.nombre, apellido: g.apellido, id: g.persona_id });
        }
      });
    }
    
    // Verificar si ya se entregaron todos
    if(verificarTodosSorteados()){
      mostrarFinal();
    } else {
      mostrarPantalla('screenPremios');renderPremios();
    }
  }catch(e){mostrarToast('Error de conexión')}
  finally{setLoading('spinnerLogin','txtLogin',false,'🎉 Entrar al sorteo')}
}

function renderPremios(){
  const g=document.getElementById('premiosGrid');g.innerHTML='';
  premios.forEach(p=>{const gn=p._ganados||0;const c=gn>=p.cantidad_ganadores;const d=document.createElement('div');d.className='premio-card'+(c?' ganado':'');d.innerHTML=`<div class="premio-orden">Premio ${p.orden_sorteo}</div><div class="premio-nombre">${p.nombre}</div>${p.descripcion?`<div class="premio-desc">${p.descripcion}</div>`:''}<div class="premio-ganadores">${p.cantidad_ganadores} ganador${p.cantidad_ganadores>1?'es':''}</div>${c?'<div class="premio-badge-ganado">✅ Sorteado</div>':''}`;if(!c)d.onclick=()=>seleccionarPremio(p);g.appendChild(d)});
}

function seleccionarPremio(p){
  premioActual=p;
  document.getElementById('premioActualNombre').textContent=p.nombre;
  document.getElementById('partNum').textContent=pool.length;
  document.getElementById('elimCounter').style.display='none';
  document.getElementById('finalistasWrap').style.display='none';
  limpiarBolitas();mostrarPantalla('screenSorteo');
  sizeSombrero();iniciarFisica();
  document.getElementById('btnSortear').disabled=false;
  document.getElementById('spinnerSorteo').style.display='none';
  document.getElementById('txtSortear').textContent='🤠 ¡Sortear!';
  document.getElementById('sombreroContainer').className='sombrero-container';
  iniciarMusica();
}

function sizeSombrero(){
  const W=window.innerWidth;
  const sw=Math.min(W*0.58,700);
  document.getElementById('sombreroContainer').style.width=sw+'px';
}

function limpiarBolitas(){bolitas.forEach(b=>{if(b.elem)b.elem.remove()});bolitas=[];}

function iniciarFisica(){
  if(runner)Matter.Runner.stop(runner);if(render)Matter.Render.stop(render);if(engine)Matter.Engine.clear(engine);
  const canvas=document.getElementById('canvas');const W=window.innerWidth;const H=window.innerHeight;
  canvas.width=W;canvas.height=H;canvas.getContext('2d').clearRect(0,0,W,H);
  limpiarBolitas();

  engine=Matter.Engine.create({gravity:{y:0.55}});
  render=Matter.Render.create({element:document.getElementById('screenSorteo'),canvas,engine,options:{width:W,height:H,background:'transparent',wireframes:false}});

  // Sombrero: grande, centrado
  const somEl=document.getElementById('sombreroContainer');
  const sw=parseFloat(somEl.style.width);
  const sh=sw*0.6;
  const cx=W/2;
  const somBottom=H*0.88;

  const wo={isStatic:true,render:{fillStyle:'transparent'},friction:0.2,restitution:0.3};
  // Piso ancho
  Matter.World.add(engine.world,Matter.Bodies.rectangle(cx,somBottom+5,sw*0.72,14,wo));
  // Paredes curvadas del sombrero (más segmentos para más precisión)
  const segs=8;
  for(let i=0;i<segs;i++){
    const t=i/segs;
    const topHalfW=sw*0.68;const botHalfW=sw*0.36;
    const halfW=botHalfW+(topHalfW-botHalfW)*t;
    const y=somBottom-sh*t;
    const segH=sh/segs+10;
    const ang=0.08-t*0.04;
    Matter.World.add(engine.world,Matter.Bodies.rectangle(cx-halfW,y,12,segH,{...wo,angle:ang}));
    Matter.World.add(engine.world,Matter.Bodies.rectangle(cx+halfW,y,12,segH,{...wo,angle:-ang}));
  }
  // Paredes y piso de la pantalla
  Matter.World.add(engine.world,Matter.Bodies.rectangle(-10,H/2,20,H*2,wo));
  Matter.World.add(engine.world,Matter.Bodies.rectangle(W+10,H/2,20,H*2,wo));
  Matter.World.add(engine.world,Matter.Bodies.rectangle(W/2,H+30,W*2,60,wo));

  runner=Matter.Runner.create();Matter.Runner.run(runner,engine);Matter.Render.run(render);

  // Bolitas caen con delay
  const delay=Math.max(10,Math.min(60,2000/pool.length));
  const dropW=sw*0.5;
  pool.forEach((p,i)=>setTimeout(()=>crearBolita(p,W,H,cx,dropW),i*delay+400));

  Matter.Events.on(render,'afterRender',()=>{bolitas.forEach(b=>{if(b.elem&&b.body){b.elem.style.left=b.body.position.x+'px';b.elem.style.top=b.body.position.y+'px'}})});
}

function crearBolita(p,W,H,cx,spread){
  const n=pool.length;
  let r;
  if(n<=20)r=Math.min(28,W*0.022);
  else if(n<=50)r=Math.min(20,W*0.016);
  else if(n<=100)r=Math.min(15,W*0.013);
  else if(n<=150)r=Math.min(12,W*0.01);
  else r=Math.min(9,W*0.008);

  const x=cx-spread/2+Math.random()*spread;
  const y=-r-Math.random()*500;
  const cols=['#8b1a1a','#3d1f00','#1a3a1a','#c9922a','#5c3210','#2a4a6a','#4a1a4a','#1a4a3a','#6b3a1f','#2d5a27'];
  const col=cols[Math.floor(Math.random()*cols.length)];
  const body=Matter.Bodies.circle(x,y,r,{restitution:0.35,friction:0.3,density:0.003,render:{fillStyle:col,strokeStyle:'rgba(240,192,64,0.35)',lineWidth:1}});
  body._pid=p.id;body._name=p.nombre+' '+p.apellido;
  Matter.World.add(engine.world,body);

  let elem=null;
  if(r>=12){
    elem=document.createElement('div');elem.className='nombre-flotante';
    elem.style.fontSize=Math.max(7,r*0.52)+'px';elem.style.width=(r*2.4)+'px';
    elem.textContent=p.nombre;
    document.getElementById('screenSorteo').appendChild(elem);
  }
  bolitas.push({body,name:body._name,id:p.id,elem,r});
}

// ── SORTEO CON ELIMINACIÓN Y FINAL DRAMÁTICO ─────────
async function iniciarSorteo(){
  if(sorteando||pool.length===0)return;
  sorteando=true;
  document.getElementById('btnSortear').disabled=true;
  document.getElementById('spinnerSorteo').style.display='block';
  document.getElementById('txtSortear').textContent='Sorteando...';

  // Elegir ganador ANTES
  const idxGanador=Math.floor(Math.random()*pool.length);
  ganadorActual=pool[idxGanador];
  const ganadorId=ganadorActual.id;

  // FASE 1: Sacudir suave
  const somb=document.getElementById('sombreroContainer');
  somb.className='sombrero-container shaking';
  agitarBolitas(0.04,0.03);
  await sleep(1500);

  // FASE 2: Sacudir fuerte + eliminación
  somb.className='sombrero-container shaking-hard';
  const elimC=document.getElementById('elimCounter');
  elimC.style.display='block';

  // Preparar eliminación: todos menos el ganador + 4 finalistas aleatorios
  const noGanador=bolitas.filter(b=>b.id!==ganadorId);
  shuffle(noGanador);

  // Reservar 4 finalistas (además del ganador = 5 total)
  const finalistas4=noGanador.splice(0,Math.min(4,noGanador.length));
  const aEliminar=noGanador; // el resto se elimina

  let quedan=bolitas.length;

  // Eliminar rápido hasta quedar 5
  for(let i=0;i<aEliminar.length;i++){
    const b=aEliminar[i];
    quedan--;
    document.getElementById('elimNum').textContent=quedan;

    let delay;
    if(quedan>50)delay=20;
    else if(quedan>20)delay=40;
    else if(quedan>10)delay=80;
    else if(quedan>5)delay=200;
    else delay=300;

    // Eyectar
    if(b.body){
      Matter.Body.applyForce(b.body,b.body.position,{x:(Math.random()-0.5)*0.18,y:-0.15-Math.random()*0.1});
    }

    // Mostrar nombre (últimos 15 eliminados)
    if(quedan<15){
      mostrarNombreEliminado(b);
    }

    setTimeout(()=>{if(b.body)Matter.World.remove(engine.world,b.body);if(b.elem)b.elem.remove()},250);

    if(quedan<15)agitarBolitas(0.02,0.015);
    await sleep(delay);
  }

  // ═══ FASE 3: ¡5 FINALISTAS! ═══
  somb.className='sombrero-container shaking';
  var finWrap = document.getElementById('finalistasWrap');
  finWrap.style.display='block';
  document.getElementById('countdownContainer').innerHTML = '';
  elimC.style.display='none';

  // Hacer que las 5 bolitas restantes se vean grandes y con nombre
  const finalistasIds=new Set([ganadorId,...finalistas4.map(b=>b.id)]);
  bolitas.filter(b=>finalistasIds.has(b.id)).forEach(b=>{
    if(b.body){
      b.body.render.strokeStyle='#f0c040';
      b.body.render.lineWidth=3;
      if(!b.elem){
        const elem=document.createElement('div');elem.className='nombre-flotante';
        elem.style.fontSize='12px';elem.style.width='80px';
        elem.textContent=b.name.split(' ')[0];
        document.getElementById('screenSorteo').appendChild(elem);
        b.elem=elem;
      }else{
        b.elem.style.fontSize='12px';
        b.elem.style.color='#f0c040';
      }
    }
  });

  await sleep(2000);

  // Countdown dramático: 5...4...3...2...1
  var countContainer = document.getElementById('countdownContainer');
  var sizes = ['3rem', '4rem', '5.5rem', '7.5rem', '10rem'];
  
  for (var c = 5; c >= 1; c--) {
    countContainer.innerHTML = '';
    var numEl = document.createElement('div');
    numEl.className = 'countdown-num';
    numEl.style.fontSize = sizes[5 - c];
    numEl.textContent = c;
    countContainer.appendChild(numEl);
    
    agitarBolitas(0.03 + (5 - c) * 0.008, 0.02 + (5 - c) * 0.005);
    await sleep(2500);
  }

  // Final: mostrar "¡YA!"
  countContainer.innerHTML = '';
  var yaEl = document.createElement('div');
  yaEl.className = 'countdown-num';
  yaEl.style.fontSize = '12rem';
  yaEl.textContent = '¡YA!';
  countContainer.appendChild(yaEl);

  somb.className = 'sombrero-container';
  await sleep(1500);

  // FASE 4: pausa final
  finWrap.style.display='none';
  await sleep(1000);

  // Resaltar la bolita ganadora
  const bGanador=bolitas.find(b=>b.id===ganadorId);
  if(bGanador){
    if(bGanador.body){
      bGanador.body.render.fillStyle='#f0c040';
      bGanador.body.render.strokeStyle='#fff';
      bGanador.body.render.lineWidth=4;
    }
    if(bGanador.elem){
      bGanador.elem.style.color='#f0c040';
      bGanador.elem.style.fontSize='16px';
      bGanador.elem.textContent=bGanador.name;
      bGanador.elem.style.width='160px';
    }
  }

  await sleep(2000);
  sorteando=false;
  mostrarGanador(ganadorActual);
}

function agitarBolitas(fx,fy){
  bolitas.forEach(b=>{if(b.body&&!b.body.isStatic)Matter.Body.applyForce(b.body,b.body.position,{x:(Math.random()-0.5)*fx,y:-Math.random()*fy})});
}

function mostrarNombreEliminado(b){
  const tag=document.createElement('div');tag.className='nombre-eliminado';
  tag.style.left=(b.body?b.body.position.x:window.innerWidth/2)+'px';
  tag.style.top=(b.body?b.body.position.y:window.innerHeight/2)+'px';
  tag.style.fontSize='1.1rem';tag.textContent=b.name;
  document.getElementById('screenSorteo').appendChild(tag);
  setTimeout(()=>tag.classList.add('volando'),50);
  setTimeout(()=>tag.remove(),900);
}

function mostrarGanador(p){
  document.getElementById('ganadorNombre').textContent=p.nombre+' '+p.apellido;
  document.getElementById('ganadorPremio').textContent=premioActual.nombre;
  fadeOutMusica();
  lanzarConfetti();mostrarPantalla('screenGanador');
}

async function marcarEntregado(){
  if(!ganadorActual.id.startsWith('T-')){try{var r=await fetch(API,{method:'POST',body:JSON.stringify({action:'registrar_ganador',persona_id:ganadorActual.id,premio_id:premioActual.id,estado:'entregado',password})});var d=await r.json();if(!d.ok){mostrarToast(d.error);return}}catch(e){mostrarToast('Error');return}}
  pool=pool.filter(function(p){return p.id!==ganadorActual.id});
  premioActual._ganados=(premioActual._ganados||0)+1;
  
  // Agregar al panel de ganadores
  agregarGanadorPanel(premioActual, ganadorActual);
  
  mostrarToast('¡Premio entregado!');
  setTimeout(function(){ volverAPremios(); }, 1500);
}
async function sortearDeNuevo(){
  if(!ganadorActual.id.startsWith('T-')){try{await fetch(API,{method:'POST',body:JSON.stringify({action:'registrar_ganador',persona_id:ganadorActual.id,premio_id:premioActual.id,estado:'no_presente',password})})}catch(e){}}
  pool=pool.filter(function(p){return p.id!==ganadorActual.id});
  if(!pool.length){mostrarToast('No quedan más participantes');setTimeout(volverAPremios,2000);return}
  document.getElementById('partNum').textContent=pool.length;
  limpiarBolitas();limpiarConfetti();mostrarPantalla('screenSorteo');
  document.getElementById('btnSortear').disabled=false;document.getElementById('spinnerSorteo').style.display='none';
  document.getElementById('txtSortear').textContent='🤠 ¡Sortear de nuevo!';
  document.getElementById('sombreroContainer').className='sombrero-container';
  document.getElementById('finalistasWrap').style.display='none';
  sizeSombrero();iniciarFisica();
}
function volverAPremios(){
  limpiarBolitas();limpiarConfetti();pararMusica();
  if(runner)Matter.Runner.stop(runner);
  if(render)Matter.Render.stop(render);
  if(engine)Matter.Engine.clear(engine);
  document.getElementById('sombreroContainer').className='sombrero-container';
  document.getElementById('finalistasWrap').style.display='none';
  
  // Verificar si todos los premios fueron sorteados
  if(verificarTodosSorteados()){
    mostrarFinal();
    return;
  }
  
  renderPremios();mostrarPantalla('screenPremios');
}

// ── PANEL DE GANADORES ──────────────────────────────
function convertirDriveUrl(url) {
  if (!url) return '';
  var str = String(url).trim();
  // https://drive.google.com/file/d/FILE_ID/view?usp=sharing
  var match = str.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (match) {
    return 'https://lh3.googleusercontent.com/d/' + match[1];
  }
  // https://drive.google.com/uc?id=FILE_ID
  var match2 = str.match(/id=([a-zA-Z0-9_-]+)/);
  if (match2) {
    return 'https://lh3.googleusercontent.com/d/' + match2[1];
  }
  return str;
}

function agregarGanadorPanel(premio, ganador) {
  ganadoresRegistrados.push({ premio: premio, ganador: ganador });
  
  var panel = document.getElementById('ganadoresPanel');
  panel.style.display = 'block';
  document.body.classList.add('con-panel');
  
  var lista = document.getElementById('ganadoresLista');
  lista.innerHTML = '';
  
  ganadoresRegistrados.forEach(function(g) {
    var item = document.createElement('div');
    item.className = 'ganador-item';
    
    var logoHtml = '';
    var imgUrl = convertirDriveUrl(g.premio.imagen_url);
    if (imgUrl) {
      logoHtml = '<img class="ganador-item-logo" src="' + imgUrl + '" alt="' + g.premio.nombre + '" onerror="this.style.display=\'none\'">';
    } else {
      logoHtml = '<div class="ganador-item-logo-placeholder">🏆</div>';
    }
    
    item.innerHTML = logoHtml +
      '<div class="ganador-item-info">' +
        '<div class="ganador-item-premio">' + g.premio.nombre + '</div>' +
        '<div class="ganador-item-nombre">' + g.ganador.nombre + ' ' + g.ganador.apellido + '</div>' +
      '</div>';
    
    lista.appendChild(item);
  });
}

function verificarTodosSorteados() {
  if (premios.length === 0) return false;
  for (var i = 0; i < premios.length; i++) {
    var ganados = premios[i]._ganados || 0;
    if (ganados < premios[i].cantidad_ganadores) return false;
  }
  return true;
}

function mostrarFinal() {
  lanzarConfettiFinal();
  mostrarPantalla('screenFinal');
}

function lanzarConfettiFinal() {
  var w = document.getElementById('confettiFinal');
  w.innerHTML = '';
  var cs = ['#f0c040','#c0392b','#27ae60','#2980b9','#f39c12','#8e44ad','#e8d5a3'];
  for (var i = 0; i < 200; i++) {
    var c = document.createElement('div');
    var cl = cs[Math.floor(Math.random()*cs.length)];
    var sz = 8+Math.random()*12;
    var l = Math.random()*100;
    var d = Math.random()*3;
    var dur = 4+Math.random()*3;
    c.style.cssText = 'position:absolute;top:-20px;left:'+l+'%;width:'+(Math.random()>0.5?sz:sz/2)+'px;height:'+sz+'px;background:'+cl+';border-radius:'+(Math.random()>0.5?'2px':'50%')+';animation:confetti-caer '+dur+'s ease-in '+d+'s both;transform:rotate('+Math.random()*360+'deg)';
    w.appendChild(c);
  }
}

function lanzarConfetti(){const w=document.getElementById('confettiWrap');w.innerHTML='';const cs=['#f0c040','#c0392b','#27ae60','#2980b9','#f39c12','#8e44ad','#e8d5a3'];for(let i=0;i<150;i++){const c=document.createElement('div');const cl=cs[Math.floor(Math.random()*cs.length)];const sz=8+Math.random()*10;const l=Math.random()*100;const d=Math.random()*2;const dur=3+Math.random()*2;c.style.cssText=`position:absolute;top:-20px;left:${l}%;width:${Math.random()>0.5?sz:sz/2}px;height:${sz}px;background:${cl};border-radius:${Math.random()>0.5?'2px':'50%'};animation:confetti-caer ${dur}s ease-in ${d}s both;transform:rotate(${Math.random()*360}deg)`;w.appendChild(c)}}
function limpiarConfetti(){document.getElementById('confettiWrap').innerHTML=''}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function mostrarPantalla(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// ── MÚSICA ──────────────────────────────────────────
function iniciarMusica() {
  var audio = document.getElementById('musicaSorteo');
  audio.currentTime = 0;
  audio.volume = 0.6;
  audio.play().catch(function() {
    // Si el navegador bloquea autoplay, ignora silenciosamente
  });
}

function fadeOutMusica() {
  var audio = document.getElementById('musicaSorteo');
  var vol = audio.volume;
  var fade = setInterval(function() {
    vol -= 0.05;
    if (vol <= 0) {
      clearInterval(fade);
      audio.pause();
      audio.volume = 0.6;
    } else {
      audio.volume = vol;
    }
  }, 100);
}

function pararMusica() {
  var audio = document.getElementById('musicaSorteo');
  audio.pause();
  audio.currentTime = 0;
  audio.volume = 0.6;
}
function setLoading(s,t,l,txt){document.getElementById(s).style.display=l?'block':'none';document.getElementById(t).textContent=txt}
function mostrarToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('visible');setTimeout(()=>t.classList.remove('visible'),4000)}
</script>
