<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorteo · Yiha! 221countryLP</title>
  <meta name="theme-color" content="#060c14">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--tierra:#1a0a00;--arena:#c8a06a;--paja:#e8d5a3;--hueso:#f5ecd7;--rojo:#8b1a1a;--rojo-vivo:#c0392b;--dorado:#c9922a;--dorado-claro:#f0c040;--verde:#27ae60;--surface:rgba(61,31,0,0.7);--border:rgba(200,160,106,0.25)}
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Josefin Sans',sans-serif;background:#060c14;color:var(--hueso)}
    .sky{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 0%,#1a2a4a 0%,#0a1428 40%,#030810 100%)}
    .stars{position:fixed;inset:0;z-index:1;pointer-events:none}
    .star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate;animation-delay:var(--delay)}
    @keyframes twinkle{from{opacity:0.1}to{opacity:1}}
    .pradera{position:fixed;bottom:0;left:0;right:0;z-index:2;pointer-events:none}
    .screen{position:fixed;inset:0;z-index:10;display:none}
    .screen.active{display:flex}

    /* LOGIN */
    #screenLogin{flex-direction:column;align-items:center;justify-content:center;padding:2rem}
    .login-vic{height:220px;filter:drop-shadow(0 12px 30px rgba(0,0,0,0.7));animation:vic-float 3s ease-in-out infinite;margin-bottom:1.5rem}
    .login-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:2rem;width:100%;max-width:380px;backdrop-filter:blur(12px)}
    .login-titulo{font-family:'Rye',serif;font-size:1.5rem;color:var(--dorado-claro);text-align:center;margin-bottom:0.25rem;text-shadow:0 0 20px rgba(240,192,64,0.4)}
    .login-sub{font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--arena);text-align:center;margin-bottom:1.5rem;opacity:0.7}
    .campo label{font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--arena);opacity:0.8;display:block;margin-bottom:0.3rem}
    input[type=password],input[type=number]{background:rgba(26,10,0,0.7);border:1px solid var(--border);border-radius:3px;color:var(--hueso);font-family:'Josefin Sans',sans-serif;font-size:1rem;padding:0.8rem;width:100%;outline:none;transition:border-color 0.15s;margin-bottom:1rem}
    input:focus{border-color:rgba(240,192,64,0.6);box-shadow:0 0 0 2px rgba(240,192,64,0.1)}

    /* TEST MODE */
    .test-toggle{margin-top:0.5rem;padding:0.5rem 0.75rem;background:rgba(200,160,106,0.1);border:1px solid rgba(200,160,106,0.2);border-radius:4px}
    .test-toggle summary{font-size:0.7rem;color:var(--arena);cursor:pointer;letter-spacing:0.1em;text-transform:uppercase}
    .test-toggle .campo{margin-top:0.5rem}
    .test-toggle .campo label{font-size:0.6rem}

    /* PREMIOS */
    #screenPremios{flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;gap:2rem}
    .premios-titulo{font-family:'Rye',serif;font-size:clamp(2rem,5vw,3.5rem);color:var(--dorado-claro);text-align:center;text-shadow:0 0 40px rgba(240,192,64,0.5)}
    .premios-sub{font-size:0.8rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--arena);opacity:0.7}
    .premios-grid{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;max-width:900px;width:100%}
    .premio-card{background:linear-gradient(160deg,rgba(61,31,0,0.8),rgba(26,10,0,0.9));border:1px solid rgba(201,146,42,0.3);border-radius:6px;padding:1.5rem 2rem;cursor:pointer;transition:all 0.2s;text-align:center;min-width:200px;flex:1;max-width:280px;backdrop-filter:blur(8px)}
    .premio-card:hover{border-color:var(--dorado);transform:translateY(-4px);box-shadow:0 12px 40px rgba(201,146,42,0.2)}
    .premio-card.ganado{opacity:0.4;cursor:not-allowed;border-color:rgba(100,100,100,0.3)}
    .premio-card.ganado:hover{transform:none;box-shadow:none}
    .premio-orden{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--arena);opacity:0.6;margin-bottom:0.5rem}
    .premio-nombre{font-family:'Rye',serif;font-size:1.3rem;color:var(--dorado-claro);margin-bottom:0.25rem}
    .premio-desc{font-size:0.78rem;color:var(--paja);opacity:0.8;margin-bottom:0.75rem}
    .premio-ganadores{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--arena);opacity:0.6}
    .premio-badge-ganado{display:inline-block;background:rgba(39,174,96,0.2);border:1px solid rgba(39,174,96,0.4);border-radius:20px;padding:0.2rem 0.75rem;font-size:0.68rem;color:#7efca8;letter-spacing:0.1em;margin-top:0.5rem}
    .vic-premios-wrap{position:fixed;bottom:0;right:2rem;z-index:5}
    .vic-premios{height:clamp(180px,20vw,280px);filter:drop-shadow(0 8px 24px rgba(0,0,0,0.6));animation:vic-float 3s ease-in-out infinite}

    /* SORTEO */
    #screenSorteo{flex-direction:column;align-items:center;justify-content:center}
    #canvas{position:absolute;inset:0;z-index:3}
    .nombre-flotante{position:absolute;z-index:7;pointer-events:none;font-family:'Josefin Sans',sans-serif;font-weight:600;color:white;text-align:center;line-height:1.1;text-shadow:0 1px 4px rgba(0,0,0,0.9);transform:translate(-50%,-50%);white-space:nowrap;overflow:hidden}

    /* URNA */
    .urna-svg{position:absolute;bottom:3%;left:50%;transform:translateX(-50%);z-index:4;width:clamp(300px,40vw,550px);pointer-events:none;filter:drop-shadow(0 10px 30px rgba(0,0,0,0.6))}

    .premio-actual{position:absolute;top:4%;left:50%;transform:translateX(-50%);z-index:6;text-align:center;background:linear-gradient(160deg,rgba(61,31,0,0.9),rgba(26,10,0,0.95));border:1px solid rgba(201,146,42,0.4);border-radius:6px;padding:0.75rem 2rem;backdrop-filter:blur(12px);white-space:nowrap}
    .premio-actual-label{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--arena);opacity:0.7}
    .premio-actual-nombre{font-family:'Rye',serif;font-size:clamp(1.2rem,3vw,2rem);color:var(--dorado-claro);text-shadow:0 0 20px rgba(240,192,64,0.4)}
    .vic-sorteo-izq{position:absolute;bottom:0;left:1%;z-index:5;height:clamp(180px,20vw,300px);filter:drop-shadow(0 8px 24px rgba(0,0,0,0.6));animation:vic-float 3s ease-in-out infinite}
    .vic-sorteo-der{position:absolute;bottom:0;right:1%;z-index:5;height:clamp(180px,20vw,300px);filter:drop-shadow(0 8px 24px rgba(0,0,0,0.6));animation:vic-float 3s ease-in-out 1s infinite;transform:scaleX(-1)}
    .btn-sortear-wrap{position:absolute;bottom:3%;left:50%;transform:translateX(-50%);z-index:8}
    .participantes-badge{position:absolute;top:4%;right:2%;z-index:6;background:rgba(26,10,0,0.8);border:1px solid rgba(201,146,42,0.3);border-radius:4px;padding:0.6rem 1rem;text-align:center}
    .part-num{font-family:'Rye',serif;font-size:1.8rem;color:var(--dorado-claro);line-height:1}
    .part-label{font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--arena);opacity:0.7}

    /* GANADOR */
    #screenGanador{flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;gap:1.5rem}
    .ganador-vic{height:clamp(180px,20vw,260px);filter:drop-shadow(0 0 40px rgba(240,192,64,0.4));animation:vic-float 2.5s ease-in-out infinite}
    .ganador-cartel{background:linear-gradient(160deg,#5c3210,#2a1200);border:3px solid var(--dorado);border-radius:6px;padding:2rem 3rem;position:relative;box-shadow:0 0 0 1px #1a0a00,0 0 0 5px #6b3a1f,0 20px 60px rgba(0,0,0,0.8);animation:cartel-entrada 0.8s cubic-bezier(0.34,1.56,0.64,1) both;max-width:600px;width:90%}
    @keyframes cartel-entrada{from{opacity:0;transform:scale(0.5) rotate(-5deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
    .ganador-cartel::before{content:'✦';position:absolute;top:12px;left:16px;color:var(--dorado);font-size:14px;opacity:0.7}
    .ganador-cartel::after{content:'✦';position:absolute;top:12px;right:16px;color:var(--dorado);font-size:14px;opacity:0.7}
    .ganador-label{font-size:0.7rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--arena);opacity:0.8;margin-bottom:0.5rem}
    .ganador-premio{font-family:'Rye',serif;font-size:clamp(1rem,3vw,1.8rem);color:var(--dorado);margin-bottom:1rem;opacity:0.9}
    .ganador-nombre{font-family:'Rye',serif;font-size:clamp(2rem,6vw,4.5rem);color:var(--dorado-claro);line-height:1.1;text-shadow:0 0 40px rgba(240,192,64,0.6),3px 3px 0 rgba(0,0,0,0.5)}
    .confetti-wrap{position:fixed;inset:0;z-index:15;pointer-events:none}
    .ganador-botones{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}

    /* BOTONES */
    .btn{padding:0.9rem 2rem;border-radius:4px;font-family:'Josefin Sans',sans-serif;font-size:0.82rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;justify-content:center;gap:0.5rem;border:none}
    .btn-dorado{background:linear-gradient(160deg,#c9922a,#8b5e1a);color:var(--hueso);box-shadow:0 6px 24px rgba(201,146,42,0.4);font-size:1rem;padding:1rem 2.5rem}
    .btn-dorado:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 10px 32px rgba(201,146,42,0.5)}
    .btn-dorado:disabled{opacity:0.4;cursor:not-allowed}
    .btn-rojo{background:linear-gradient(160deg,var(--rojo-vivo),var(--rojo));color:var(--hueso);box-shadow:0 4px 16px rgba(192,57,43,0.4)}
    .btn-rojo:hover{transform:translateY(-2px)}
    .btn-verde{background:linear-gradient(160deg,#2ecc71,#27ae60);color:white;box-shadow:0 4px 16px rgba(39,174,96,0.4)}
    .btn-verde:hover{transform:translateY(-2px)}
    .btn-outline{background:transparent;color:var(--arena);border:1px solid rgba(200,160,106,0.4)}
    .btn-outline:hover{background:rgba(200,160,106,0.08);color:var(--hueso)}
    .btn-grande{font-size:1.1rem;padding:1.1rem 3rem}

    @keyframes vic-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes entrar{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes confetti-caer{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
    .toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:200;background:rgba(139,26,26,0.95);border:1px solid rgba(192,57,43,0.5);border-radius:3px;padding:0.75rem 1.25rem;font-size:0.85rem;color:#f5d5d5;max-width:400px;text-align:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
    .toast.visible{opacity:1}
    .spinner{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);border-top-color:white;animation:spin 0.7s linear infinite;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="sky"></div>
<div class="stars" id="stars"></div>
<svg class="pradera" viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M0,120 L0,80 Q80,55 140,70 Q200,85 260,60 Q320,35 400,55 Q480,75 560,45 Q620,25 680,50 Q740,75 820,40 Q880,15 940,45 Q1000,75 1080,40 Q1140,15 1200,45 Q1260,75 1340,55 Q1390,42 1440,60 L1440,120 Z" fill="#030a03" opacity="0.98"/>
  <g fill="#041504" opacity="0.9"><rect x="80" y="35" width="7" height="50"/><rect x="62" y="52" width="24" height="6" rx="3"/><rect x="62" y="46" width="7" height="12" rx="3"/><rect x="80" y="65" width="24" height="6" rx="3"/><rect x="97" y="59" width="7" height="12" rx="3"/></g>
  <g fill="#041504" opacity="0.9"><rect x="1353" y="28" width="7" height="58"/><rect x="1335" y="48" width="24" height="6" rx="3"/><rect x="1335" y="42" width="7" height="12" rx="3"/></g>
</svg>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div class="screen active" id="screenLogin">
  <img src="img/vic_juntos_saludo.png" class="login-vic" alt="Vic y compañera">
  <div class="login-card">
    <div class="login-titulo">¡Sorteo!</div>
    <div class="login-sub">Cumple 221countryLP · 3 Oct 2026</div>
    <div class="campo"><label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter') entrarSorteo()">
    </div>
    <button class="btn btn-dorado" style="width:100%" onclick="entrarSorteo()">
      <div class="spinner" id="spinnerLogin"></div>
      <span id="txtLogin">🎉 Entrar al sorteo</span>
    </button>
    <details class="test-toggle">
      <summary>Modo test</summary>
      <div class="campo"><label>Simular cantidad de participantes</label>
        <input type="number" id="testCantidad" value="0" min="0" max="200" placeholder="0 = usar datos reales">
      </div>
    </details>
  </div>
</div>

<!-- PREMIOS -->
<div class="screen" id="screenPremios">
  <div class="premios-titulo" style="animation:entrar 0.6s ease both">¿Qué sorteamos?</div>
  <div class="premios-sub" style="animation:entrar 0.6s ease 0.1s both">Elegí el premio para este sorteo</div>
  <div class="premios-grid" id="premiosGrid" style="animation:entrar 0.6s ease 0.2s both"></div>
  <div class="vic-premios-wrap"><img src="img/vic_apoyado_valla.png" class="vic-premios" alt="Vic"></div>
</div>

<!-- SORTEO -->
<div class="screen" id="screenSorteo">
  <div class="premio-actual"><div class="premio-actual-label">Sorteando</div><div class="premio-actual-nombre" id="premioActualNombre">---</div></div>
  <div class="participantes-badge"><div class="part-num" id="partNum">0</div><div class="part-label">Participantes</div></div>
  <canvas id="canvas"></canvas>

  <!-- URNA visible tipo pecera/recipiente transparente -->
  <svg class="urna-svg" viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
    <!-- Sombra base -->
    <ellipse cx="250" cy="330" rx="210" ry="18" fill="rgba(0,0,0,0.4)"/>
    <!-- Cuerpo urna (forma de recipiente cowboy/cuero) -->
    <path d="M60 60 Q55 180 65 280 Q80 320 250 325 Q420 320 435 280 Q445 180 440 60 Z"
      fill="rgba(61,31,0,0.25)" stroke="#c9922a" stroke-width="2" stroke-opacity="0.5"/>
    <!-- Borde superior (boca) -->
    <ellipse cx="250" cy="58" rx="192" ry="22" fill="rgba(61,31,0,0.4)" stroke="#c9922a" stroke-width="2" stroke-opacity="0.6"/>
    <!-- Reflejo decorativo -->
    <path d="M90 80 Q85 180 92 260" stroke="rgba(240,192,64,0.12)" stroke-width="3" fill="none"/>
    <!-- Banda decorativa -->
    <path d="M65 280 Q80 295 250 298 Q420 295 435 280" stroke="#c9922a" stroke-width="1.5" stroke-opacity="0.4" fill="none"/>
    <!-- Hebilla central -->
    <rect x="237" y="284" width="26" height="14" rx="3" fill="#f0c040" opacity="0.5"/>
  </svg>

  <img src="img/vic_bailando_juntos.png" class="vic-sorteo-izq" alt="Vic">
  <img src="img/vic_juntos_pulgar.png" class="vic-sorteo-der" alt="Vic compañera">
  <div class="btn-sortear-wrap">
    <button class="btn btn-dorado btn-grande" id="btnSortear" onclick="iniciarSorteo()">
      <div class="spinner" id="spinnerSorteo"></div>
      <span id="txtSortear">🤠 ¡Sortear!</span>
    </button>
  </div>
</div>

<!-- GANADOR -->
<div class="screen" id="screenGanador">
  <div class="confetti-wrap" id="confettiWrap"></div>
  <img src="img/vic_juntos_highfive.png" class="ganador-vic" alt="Vic festejando">
  <div class="ganador-cartel">
    <div class="ganador-label">¡Y el ganador es...!</div>
    <div class="ganador-premio" id="ganadorPremio">Premio</div>
    <div class="ganador-nombre" id="ganadorNombre">Nombre Apellido</div>
  </div>
  <div class="ganador-botones">
    <button class="btn btn-verde btn-grande" onclick="marcarEntregado()">✅ Premio entregado</button>
    <button class="btn btn-rojo" onclick="sortearDeNuevo()">🔄 Sortear de nuevo</button>
    <button class="btn btn-outline" onclick="volverAPremios()">← Otro premio</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const API = 'https://script.google.com/macros/s/AKfycbzgZNqX4YHQ8yONqi5a_lS1JGUA-X58KcBotLqc3dYSBEnkhcM2l0HTKsOXum9iWr2E/exec';

let password='',personas=[],pool=[],premios=[],premioActual=null,ganadorActual=null;
let engine,render,runner;
let bolitas=[];
let sorteando=false;
let testMode=0;

(function(){const c=document.getElementById('stars');for(let i=0;i<150;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2.5+0.5;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*75}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s`;c.appendChild(s)}})();

async function entrarSorteo(){
  const pass=document.getElementById('loginPass').value.trim();
  if(!pass){mostrarToast('Ingresá la contraseña');return}
  testMode=parseInt(document.getElementById('testCantidad').value)||0;
  setLoading('spinnerLogin','txtLogin',true,'Entrando...');
  try{
    const[rC,rP,rPe]=await Promise.all([
      fetch(`${API}?action=config_admin&password=${encodeURIComponent(pass)}`),
      fetch(`${API}?action=premios_sorteo&password=${encodeURIComponent(pass)}`),
      fetch(`${API}?action=personas_sorteo&password=${encodeURIComponent(pass)}`)
    ]);
    const[dC,dP,dPe]=await Promise.all([rC.json(),rP.json(),rPe.json()]);
    if(!dC.ok){mostrarToast(dC.error||'Contraseña incorrecta');return}
    password=pass;premios=dP.premios||[];personas=dPe.personas||[];

    // Modo test: generar personas ficticias
    if(testMode>0){
      const nombres=['Ana','Luis','María','Carlos','Laura','Pedro','Sofía','Diego','Lucía','Martín','Valentina','Tomás','Camila','Mateo','Julieta','Nicolás','Florencia','Santiago','Milagros','Agustín','Rocío','Bruno','Celeste','Franco','Abril','Gonzalo','Pilar','Facundo','Delfina','Lautaro','Carolina','Joaquín','Paula','Ramiro','Daniela','Hernán','Aldana','Ignacio','Brenda','Mauro','Andrea','Ezequiel','Romina','Gastón','Natalia','Sergio','Mora','Sebastián','Candela','Emmanuel'];
      const apells=['García','López','Martínez','Rodríguez','Pérez','González','Sánchez','Romero','Gómez','Torres','Díaz','Fernández','Álvarez','Moreno','Ruiz','Acosta','Molina','Castro','Herrera','Medina','Ortiz','Silva','Ríos','Flores','Benítez'];
      personas=[];
      for(let i=0;i<testMode;i++){
        personas.push({id:'TEST-'+i,nombre:nombres[i%nombres.length],apellido:apells[i%apells.length]});
      }
    }

    pool=[...personas];
    if(personas.length===0){mostrarToast('No hay participantes');return}
    mostrarPantalla('screenPremios');renderPremios();
  }catch(e){mostrarToast('Error de conexión')}
  finally{setLoading('spinnerLogin','txtLogin',false,'🎉 Entrar al sorteo')}
}

function renderPremios(){
  const g=document.getElementById('premiosGrid');g.innerHTML='';
  premios.forEach(p=>{
    const ganados=p._ganados||0;const completo=ganados>=p.cantidad_ganadores;
    const c=document.createElement('div');c.className='premio-card'+(completo?' ganado':'');
    c.innerHTML=`<div class="premio-orden">Premio ${p.orden_sorteo}</div><div class="premio-nombre">${p.nombre}</div>${p.descripcion?`<div class="premio-desc">${p.descripcion}</div>`:''}<div class="premio-ganadores">${p.cantidad_ganadores} ganador${p.cantidad_ganadores>1?'es':''}</div>${completo?'<div class="premio-badge-ganado">✅ Sorteado</div>':''}`;
    if(!completo)c.onclick=()=>seleccionarPremio(p);
    g.appendChild(c);
  });
}

function seleccionarPremio(premio){
  premioActual=premio;
  document.getElementById('premioActualNombre').textContent=premio.nombre;
  document.getElementById('partNum').textContent=pool.length;
  limpiarBolitas();
  mostrarPantalla('screenSorteo');
  iniciarFisica();
  const btn=document.getElementById('btnSortear');btn.disabled=false;
  document.getElementById('spinnerSorteo').style.display='none';
  document.getElementById('txtSortear').textContent='🤠 ¡Sortear!';
}

function limpiarBolitas(){
  bolitas.forEach(b=>{if(b.elem)b.elem.remove()});
  bolitas=[];
}

function iniciarFisica(){
  if(runner)Matter.Runner.stop(runner);
  if(render)Matter.Render.stop(render);
  if(engine)Matter.Engine.clear(engine);

  const canvas=document.getElementById('canvas');
  const W=window.innerWidth;const H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  canvas.getContext('2d').clearRect(0,0,W,H);
  limpiarBolitas();

  // Gravedad más suave para que caigan elegantemente
  engine=Matter.Engine.create({gravity:{y:0.5}});

  render=Matter.Render.create({
    element:document.getElementById('screenSorteo'),canvas:canvas,engine:engine,
    options:{width:W,height:H,background:'transparent',wireframes:false}
  });

  // Dimensiones de la urna (coinciden con el SVG)
  const urnaW=Math.min(W*0.40,550);
  const urnaH=urnaW*0.7;
  const cx=W/2;
  const urnaBottom=H*0.92;
  const urnaTop=urnaBottom-urnaH;

  // Paredes de la urna (invisible pero sólido)
  const wallOpts={isStatic:true,render:{fillStyle:'transparent'},friction:0.3};
  const espesor=15;

  // Piso
  Matter.World.add(engine.world,Matter.Bodies.rectangle(cx,urnaBottom+espesor/2,urnaW,espesor,wallOpts));
  // Pared izquierda (ligeramente inclinada como la urna)
  Matter.World.add(engine.world,Matter.Bodies.rectangle(cx-urnaW/2-espesor/2+10,urnaBottom-urnaH/2,espesor,urnaH+20,{...wallOpts,angle:0.05}));
  // Pared derecha
  Matter.World.add(engine.world,Matter.Bodies.rectangle(cx+urnaW/2+espesor/2-10,urnaBottom-urnaH/2,espesor,urnaH+20,{...wallOpts,angle:-0.05}));
  // Paredes laterales pantalla
  Matter.World.add(engine.world,Matter.Bodies.rectangle(-10,H/2,20,H*2,wallOpts));
  Matter.World.add(engine.world,Matter.Bodies.rectangle(W+10,H/2,20,H*2,wallOpts));

  runner=Matter.Runner.create();
  Matter.Runner.run(runner,engine);
  Matter.Render.run(render);

  // Crear bolitas con delay para efecto cascada
  const delay=Math.max(30,Math.min(120,3000/pool.length));
  pool.forEach((p,i)=>{setTimeout(()=>crearBolita(p,W,H,cx,urnaW),i*delay+500)});

  // Actualizar posiciones de nombres
  Matter.Events.on(render,'afterRender',()=>{
    bolitas.forEach(b=>{
      if(b.elem&&b.body){
        b.elem.style.left=b.body.position.x+'px';
        b.elem.style.top=b.body.position.y+'px';
      }
    });
  });
}

function crearBolita(persona,W,H,cx,urnaW){
  // Radio adaptativo según cantidad
  const cant=pool.length;
  let radio;
  if(cant<=20)radio=Math.min(32,W*0.025);
  else if(cant<=50)radio=Math.min(22,W*0.018);
  else if(cant<=100)radio=Math.min(16,W*0.013);
  else radio=Math.min(12,W*0.01);

  // Caen desde arriba centrados en la urna
  const spread=urnaW*0.7;
  const x=cx-spread/2+Math.random()*spread;
  const y=-radio-Math.random()*300;

  const colores=['#8b1a1a','#3d1f00','#1a3a1a','#c9922a','#5c3210','#2a4a6a'];
  const color=colores[Math.floor(Math.random()*colores.length)];

  const body=Matter.Bodies.circle(x,y,radio,{
    restitution:0.35,friction:0.4,density:0.003,
    render:{fillStyle:color,strokeStyle:'rgba(240,192,64,0.5)',lineWidth:1}
  });
  body._personaId=persona.id;
  body._nombre=persona.nombre+' '+persona.apellido;
  Matter.World.add(engine.world,body);

  // Etiqueta solo si hay espacio (radio > 12)
  if(radio>12){
    const div=document.createElement('div');
    div.className='nombre-flotante';
    div.style.fontSize=Math.max(7,radio*0.55)+'px';
    div.style.width=(radio*2.2)+'px';
    div.textContent=persona.nombre;
    document.getElementById('screenSorteo').appendChild(div);
    bolitas.push({body,nombre:body._nombre,id:persona.id,elem:div});
  }else{
    bolitas.push({body,nombre:body._nombre,id:persona.id,elem:null});
  }
}

async function iniciarSorteo(){
  if(sorteando||pool.length===0)return;
  sorteando=true;
  document.getElementById('btnSortear').disabled=true;
  document.getElementById('spinnerSorteo').style.display='block';
  document.getElementById('txtSortear').textContent='Sorteando...';

  // Agitar las bolitas (aplicar fuerzas aleatorias)
  bolitas.forEach(b=>{
    if(b.body){
      const fx=(Math.random()-0.5)*0.08;
      const fy=-Math.random()*0.06-0.02;
      Matter.Body.applyForce(b.body,b.body.position,{x:fx,y:fy});
    }
  });

  await sleep(2000);

  // Segunda agitada
  bolitas.forEach(b=>{
    if(b.body){
      const fx=(Math.random()-0.5)*0.06;
      const fy=-Math.random()*0.04;
      Matter.Body.applyForce(b.body,b.body.position,{x:fx,y:fy});
    }
  });

  await sleep(1500);

  const idx=Math.floor(Math.random()*pool.length);
  ganadorActual=pool[idx];
  sorteando=false;
  mostrarGanador(ganadorActual);
}

function mostrarGanador(persona){
  document.getElementById('ganadorNombre').textContent=persona.nombre+' '+persona.apellido;
  document.getElementById('ganadorPremio').textContent=premioActual.nombre;
  lanzarConfetti();
  mostrarPantalla('screenGanador');
}

async function marcarEntregado(){
  if(!ganadorActual.id.startsWith('TEST-')){
    try{
      const res=await fetch(API,{method:'POST',body:JSON.stringify({action:'registrar_ganador',persona_id:ganadorActual.id,premio_id:premioActual.id,estado:'entregado',password})});
      const data=await res.json();
      if(!data.ok){mostrarToast(data.error);return}
    }catch(e){mostrarToast('Error de conexión');return}
  }
  pool=pool.filter(p=>p.id!==ganadorActual.id);
  premioActual._ganados=(premioActual._ganados||0)+1;
  mostrarToast('¡Premio entregado! '+ganadorActual.nombre+' '+ganadorActual.apellido);
  setTimeout(volverAPremios,1500);
}

async function sortearDeNuevo(){
  if(!ganadorActual.id.startsWith('TEST-')){
    try{await fetch(API,{method:'POST',body:JSON.stringify({action:'registrar_ganador',persona_id:ganadorActual.id,premio_id:premioActual.id,estado:'no_presente',password})})}catch(e){}
  }
  pool=pool.filter(p=>p.id!==ganadorActual.id);
  if(pool.length===0){mostrarToast('No quedan más participantes');setTimeout(volverAPremios,2000);return}
  document.getElementById('partNum').textContent=pool.length;
  limpiarBolitas();limpiarConfetti();
  mostrarPantalla('screenSorteo');
  document.getElementById('btnSortear').disabled=false;
  document.getElementById('spinnerSorteo').style.display='none';
  document.getElementById('txtSortear').textContent='🤠 ¡Sortear de nuevo!';
  iniciarFisica();
}

function volverAPremios(){
  limpiarBolitas();limpiarConfetti();
  if(runner)Matter.Runner.stop(runner);
  if(render)Matter.Render.stop(render);
  if(engine)Matter.Engine.clear(engine);
  renderPremios();mostrarPantalla('screenPremios');
}

function lanzarConfetti(){
  const w=document.getElementById('confettiWrap');w.innerHTML='';
  const cols=['#f0c040','#c0392b','#27ae60','#2980b9','#f39c12','#8e44ad','#e8d5a3'];
  for(let i=0;i<120;i++){const c=document.createElement('div');const col=cols[Math.floor(Math.random()*cols.length)];const sz=8+Math.random()*8;const l=Math.random()*100;const d=Math.random()*2;const dur=3+Math.random()*2;const r=Math.random()>0.5;c.style.cssText=`position:absolute;top:-20px;left:${l}%;width:${r?sz:sz/2}px;height:${sz}px;background:${col};border-radius:${r?'2px':'50%'};animation:confetti-caer ${dur}s ease-in ${d}s both;transform:rotate(${Math.random()*360}deg)`;w.appendChild(c)}
}
function limpiarConfetti(){document.getElementById('confettiWrap').innerHTML=''}

function mostrarPantalla(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function setLoading(s,t,l,txt){document.getElementById(s).style.display=l?'block':'none';document.getElementById(t).textContent=txt}
function mostrarToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('visible');setTimeout(()=>t.classList.remove('visible'),4000)}
</script>
